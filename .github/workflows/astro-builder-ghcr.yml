name: Build and Publish Astro Builder

on:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:
    branches: ["master"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.event.repository.name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate builder Dockerfile exists
        run: test -f builder/Dockerfile

  prepare-tag:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name || steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve existing tag
        id: resolve
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Bump patch tag
        id: bump
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags --force origin
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
            latest="${latest:-v0.0.0}"
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "${version}"
            new_tag="v${major}.${minor}.$((patch + 1))"
            echo "Attempt ${attempt}: tagging ${new_tag} (previous: ${latest})"
            if git tag -a "${new_tag}" -m "Release ${new_tag}" && git push origin "refs/tags/${new_tag}"; then
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Push failed (tag may already exist); retrying after refetch"
            git tag -d "${new_tag}" 2>/dev/null || true
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push a unique tag after 3 attempts"
              exit 1
            fi
          done

  builder-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.builder }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            builder:
              - 'builder/**'
              - '.github/workflows/astro-builder-ghcr.yml'

  build-publish:
    needs: [validate, prepare-tag, builder-changes]
    if: github.event_name == 'push' && needs.builder-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: pkg
        env:
          TAG_NAME: ${{ needs.prepare-tag.outputs.tag_name }}
        run: |
          if [[ "${TAG_NAME}" == v* ]]; then
            VERSION="${TAG_NAME}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(node -e "process.stdout.write(require('./site/package.json').version)")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.pkg.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./builder
          file: ./builder/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
